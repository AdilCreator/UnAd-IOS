<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, sans-serif; background: #f5f5f7; padding: 40px; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    h1 span { color: #007AFF; }
    input[type="text"] { padding: 12px; border: 1px solid #ddd; border-radius: 10px; width: 65%; }
    button { background: #007AFF; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    li { background: #f9f9f9; padding: 15px; margin-top: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    .remove { color: #ff3b30; cursor: pointer; font-weight: bold; padding: 5px 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>UnAd-<span>IOS</span> Ultra Settings</h1>
    <h3>Site Whitelist (add sites where Ad-Blocker wont affect)</h3>
    <div style="display:flex; gap:10px; margin-bottom: 20px;">
        <input type="text" id="siteInput" placeholder="example.com">
        <button id="addBtn">Add Site</button>
    </div>
    <ul id="whitelist"></ul>
    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
    <a href="#" id="githubLink" style="color: #007AFF; text-decoration: none;">View Code on GitHub →</a>
  </div>
  <script src="settings.js"></script>
</body>
</html>
