<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* Reset and Base Styling */
    body { 
      width: 340px; 
      background: transparent; 
      color: #e2e8f0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      padding: 0; 
      margin: 0; 
      overflow: hidden; 
    }

    /* Rounded Glassmorphism Container */
    .container { 
      padding: 20px; 
      background: radial-gradient(circle at top, #1e293b 0%, #05070a 100%);
      border-radius: 24px; 
      margin: 10px; 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header & Toggle Row */
    .header-row { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 15px; 
    }

    .status-label { 
      font-size: 11px; 
      color: #94a3b8; 
      letter-spacing: 1px; 
      text-transform: uppercase; 
      font-weight: 600;
    }

    /* Custom Toggle Switch */
    .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { 
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
      background-color: rgba(255, 255, 255, 0.1); transition: .4s; border-radius: 20px; 
    }
    .slider:before { 
      position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; 
      background-color: white; transition: .4s; border-radius: 50%; 
    }
    input:checked + .slider { background-color: #38bdf8; }
    input:checked + .slider:before { transform: translateX(20px); }

    /* Pulsing AI Core */
    .ai-core { 
      width: 70px; height: 70px; margin: 10px auto; 
      background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
      animation: pulse 3s infinite ease-in-out;
      transition: filter 0.3s, opacity 0.3s;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 40px rgba(129, 140, 248, 0.6); }
    }

    /* Counter Display */
    .blocked-huge { 
      font-size: 48px; 
      font-weight: 800; 
      text-align: center; 
      margin: 5px 0; 
      color: #fff; 
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    .sub-text { 
      text-align: center; 
      font-size: 11px; 
      color: #94a3b8; 
      text-transform: uppercase; 
      letter-spacing: 1px;
    }

    /* Button Group */
    .btn-group { 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      margin-top: 20px; 
    }

    .btn { 
      padding: 12px; 
      border-radius: 16px; 
      border: none; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.2s ease; 
      font-size: 14px;
    }

    .btn-primary { background: #fff; color: #000; }
    .btn-primary:hover { background: #f1f5f9; transform: translateY(-1px); }

    .btn-secondary { background: rgba(255, 255, 255, 0.1); color: #fff; }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }

    /* Footer Timestamp */
    .update-footer { 
      text-align: center; 
      font-size: 10px; 
      color: rgba(148, 163, 184, 0.4); 
      margin-top: 15px; 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <span class="status-label">Toggle Protection</span>
      <label class="switch">
        <input type="checkbox" id="globalToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="ai-core" id="aiCore">
      <svg width="35" height="35" viewBox="0 0 24 24" fill="white">
        <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
      </svg>
    </div>

    <div class="blocked-huge" id="blockedCount">0</div>
    <div class="sub-text">Ads Blocked</div>

    <div class="btn-group">
      <button id="zenBtn" class="btn btn-primary">Enter ZEN Mode *BETA)</button>
      <button id="settingsBtn" class="btn btn-secondary">Settings</button>
    </div>

    <div class="update-footer">Updated May 1, 2026</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
